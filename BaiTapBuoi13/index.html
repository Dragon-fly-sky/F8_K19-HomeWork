<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập buổi 13: Flex box (Part-3) Tạo Strips Hover Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="strip strip1">
        <h2 class="title">Relax</h2>
        <div class="overlay"></div>
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop" alt="Relax" class="image">
    </div>

    <div class="strip strip2">
        <h2 class="title">Explore</h2>
        <div class="overlay"></div>
        <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop" alt="Explore" class="image">
    </div>

    <div class="strip strip3">
        <h2 class="title">Travel</h2>

        <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop" alt="Travel" class="image">
    </div>

    <div class="strip strip4">
        <h2 class="title">Achieve</h2>
        <div class="overlay"></div>
        <img src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop" alt="Achieve" class="image">
    </div>

    <div class="strip strip5">
        <h2 class="title">Dare</h2>
        <div class="overlay"></div>
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop" alt="Dare" class="image">
    </div>
</div>

</html>
