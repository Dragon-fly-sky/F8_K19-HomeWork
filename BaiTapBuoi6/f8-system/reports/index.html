<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">

    <style>
        p{
            color: chocolate;
        }
    </style>
</head>
<body>
    <h1>REPORT PAGE</h1>

    <h2 class="title">Thong ke he thong</h2>

    <div class="section" id="main">
        <!--
        Phan tu nay co:
        tag (p)
        class (.title)
        id (#main)
        inline style
        external css
        internal css

        Selector thang: inline style
        Vi inline style co do uu tien cao nhat trong CSS priority.

        Mau hien thi: blueviolet
        -->
        <p class="title" id="special" style="color: blueviolet">Tong so hoc vien</p>

        <p class="big">Tong so khoa hoc</p>

        <p>Tong so don hang</p>

        <p class="highlight">Doanh thu</p>

    </div>
</body>
</html>
