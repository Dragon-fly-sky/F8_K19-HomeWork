<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">

    <style>
        h3{
            background:lightyellow;
        }
        .big{
            border:1px solid black;
            padding:10px;
        }
    </style>
</head>
<body>
    <div class="big">
    <!--
   Phan tu nay co:
   tag (h1)
   class (.title)
   id (#special)
   inline style
   external css (base.css + theme.css)
   internal css

   Selector thang: inline style
   Vi inline style co do uu tien cao nhat.

   Mau hien thi: red
   -->
        <h1 class="title" id="special" style="color:red">
            DASHBOARD
        </h1>

        <h2 class="section">Tong quan he thong</h2>

        <h3 class="title">Courses</h3>
        <p class="highlight">Quan ly khoa hoc</p>

        <h3 class="title">Students</h3>
        <p class="highlight">Quan ly hoc vien</p>

        <h3 class="title">Teachers</h3>
        <p class="highlight">Quan ly giang vien</p>

        <h3 class="title">Orders</h3>
        <p class="highlight">Quan ly don hang</p>

        <h3 class="title">Reports</h3>
        <p class="highlight">Bao cao he thong</p>
    </div>
</body>
</html>
